{{define "content"}}
<article class="artifact output-style">
  <div class="artifact-header">
    <span class="kind-badge kind-output-style">output style</span>
    <h1>{{if .Page.Envelope.name}}{{.Page.Envelope.name}}{{else}}{{.Page.Envelope.slug}}{{end}}</h1>
    {{with .Page.Envelope.description}}<p class="description">{{.}}</p>{{end}}
  </div>
  <div class="prose">
    {{.Page.Content}}
  </div>
</article>
{{end}}
