# Config defaults contributed by the fuego-dotclaude pack. The consuming site's
# config (or the CLI's options) is deep-merged on top, so anything here can be
# overridden. Routes are keyed by the artifact type the AfterParse hook assigns;
# the hook also sets a path-derived {slug}, so artifacts nest under their
# section and never collide.
routes:
  agent: "/agents/{slug}"
  skill: "/skills/{slug}"
  skill-doc: "/skills/{slug}"
  command: "/commands/{slug}"
  output-style: "/output-styles/{slug}"
  memory: "/memory/{slug}"
  mcp: "/mcp"
  settings: "/settings"
  settings-local: "/settings/local"

# Faceted navigation. Taxonomy keys match the envelope fields the AfterParse
# hook normalizes: tools (agents' tools + commands' allowed-tools), model, and
# source (provenance). The engine generates a term page per value and an index.
taxonomies:
  tools:
    path: "/tools/{term}"
    layout: "taxonomy-term"
    index_path: "/tools"
    index_layout: "taxonomy-index"
  model:
    path: "/models/{term}"
    layout: "taxonomy-term"
    index_path: "/models"
    index_layout: "taxonomy-index"
  source:
    path: "/sources/{term}"
    layout: "taxonomy-term"
    index_path: "/sources"
    index_layout: "taxonomy-index"
